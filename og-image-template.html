<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; }
body {
  font-family: 'Arial Black', Arial, sans-serif;
  background: #161310;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 64px 80px;
}
.top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.logo {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1;
  text-transform: uppercase;
}
.logo span { color: #C22E2E; }
.badge {
  font-family: Arial, sans-serif;
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 10px 18px;
  margin-top: 6px;
}
.middle {
  flex: 1;
  display: flex;
  align-items: center;
}
.headline {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 68px;
  font-weight: 400;
  line-height: 1.08;
  letter-spacing: -0.01em;
  max-width: 820px;
}
.headline em {
  font-style: italic;
  color: rgba(255,255,255,0.55);
}
.bottom {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.url {
  font-family: Arial, sans-serif;
  font-size: 16px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.clients {
  font-family: Arial, sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  text-align: right;
  line-height: 1.7;
}
.rule {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin-bottom: 28px;
}
</style>
</head>
<body>
  <div class="top">
    <div class="logo">SELSOVET<span>®</span> MERCH</div>
    <div class="badge">Лауреат Silver Mercury 2026</div>
  </div>

  <div class="middle">
    <div class="headline">Мерч для бизнеса,<br><em>который работает</em></div>
  </div>

  <div>
    <div class="rule"></div>
    <div class="bottom">
      <div class="url">merch.selsovet.store</div>
      <div class="clients">Главкосмос · НМГ · Советский Спорт<br>Kaspersky · Интервидение · ВГТРК</div>
    </div>
  </div>
</body>
</html>
